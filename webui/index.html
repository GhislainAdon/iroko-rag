<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>iroko-rag — chat with your documents</title>
<style>
  :root { --bg:#0f1419; --panel:#1a2129; --border:#2c3640; --text:#e6edf3;
          --muted:#8b98a5; --accent:#3fb68b; --user:#274156; }
  * { box-sizing:border-box; margin:0; }
  body { font:15px/1.5 system-ui,sans-serif; background:var(--bg); color:var(--text);
         display:flex; flex-direction:column; height:100vh; }
  header { padding:12px 20px; background:var(--panel); border-bottom:1px solid var(--border);
           display:flex; gap:12px; align-items:center; flex-wrap:wrap; }
  header h1 { font-size:17px; }
  header h1 span { color:var(--accent); }
  select,button,input[type=text] { font:inherit; color:var(--text); background:var(--bg);
           border:1px solid var(--border); border-radius:8px; padding:8px 12px; }
  button { cursor:pointer; background:var(--accent); color:#04150e; border:0; font-weight:600; }
  button:disabled { opacity:.5; cursor:default; }
  #messages { flex:1; overflow-y:auto; padding:20px; display:flex;
              flex-direction:column; gap:12px; max-width:860px; width:100%; margin:0 auto; }
  .msg { padding:10px 14px; border-radius:12px; max-width:85%; white-space:pre-wrap; }
  .user { background:var(--user); align-self:flex-end; }
  .bot  { background:var(--panel); border:1px solid var(--border); align-self:flex-start; }
  .src  { font-size:12px; color:var(--muted); margin-top:6px; }
  footer { padding:14px 20px; background:var(--panel); border-top:1px solid var(--border); }
  footer form { display:flex; gap:10px; max-width:860px; margin:0 auto; }
  footer input { flex:1; }
  .hint { color:var(--muted); font-size:13px; }
</style>
</head>
<body>
<header>
  <h1>🌳 <span>iroko-rag</span></h1>
  <select id="docs"><option value="">— no document —</option></select>
  <input type="file" id="file" hidden>
  <button id="upload">📄 Index a document</button>
  <span class="hint" id="status"></span>
</header>

<div id="messages">
  <div class="msg bot">Upload a document (PDF, Word, PowerPoint, Markdown, even a scanned
PDF), pick it in the list, and ask me anything about it. No RAG code required.</div>
</div>

<footer>
  <form id="ask">
    <input type="text" id="q" placeholder="Ask a question about the selected document…" autocomplete="off">
    <button type="submit" id="send">Send</button>
  </form>
</footer>

<script>
// Served by server.py -> same-origin relative calls. Opened as a local
// file or in an editor preview -> relative URLs cannot resolve, so fall
// back to the default API address (CORS is open server-side).
const API = location.protocol.startsWith('http') ? '' : 'http://localhost:8000';
const $ = id => document.getElementById(id);
const messages = $('messages');

function add(cls, text, sources) {
  const div = document.createElement('div');
  div.className = 'msg ' + cls;
  div.textContent = text;
  if (sources && sources.length) {
    const s = document.createElement('div');
    s.className = 'src';
    s.textContent = '📎 ' + sources.map(x =>
      x.title + (x.pages ? ` (p.${x.pages[0]}–${x.pages[1]})` : '')).join(' · ');
    div.appendChild(s);
  }
  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;
  return div;
}

async function refreshDocs(selectId) {
  const docs = await (await fetch(API + '/api/documents')).json();
  $('docs').innerHTML = '<option value="">— no document —</option>' + docs.map(d =>
    `<option value="${d.doc_id}">${d.doc_name || d.doc_id} (${d.type})</option>`).join('');
  if (selectId) $('docs').value = selectId;
}

$('upload').onclick = () => $('file').click();
$('file').onchange = async () => {
  const f = $('file').files[0];
  if (!f) return;
  $('status').textContent = `Indexing ${f.name}… (LLM at work, this can take a few minutes)`;
  $('upload').disabled = true;
  const body = new FormData();
  body.append('file', f);
  try {
    const r = await fetch(API + '/api/documents', { method: 'POST', body });
    const d = await r.json();
    if (!r.ok) throw new Error(d.detail || r.statusText);
    await refreshDocs(d.doc_id);
    $('status').textContent = `✅ ${d.doc_name} indexed`;
  } catch (e) {
    $('status').textContent = '❌ ' + e.message;
  } finally {
    $('upload').disabled = false;
    $('file').value = '';
  }
};

$('ask').onsubmit = async e => {
  e.preventDefault();
  const doc_id = $('docs').value, question = $('q').value.trim();
  if (!question) return;
  if (!doc_id) { add('bot', 'Select a document first 🙂'); return; }
  add('user', question);
  $('q').value = '';
  $('send').disabled = true;
  const thinking = add('bot', '…');
  try {
    const r = await fetch(API + '/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ doc_id, question })
    });
    const d = await r.json();
    if (!r.ok) throw new Error(d.detail || r.statusText);
    thinking.remove();
    add('bot', d.answer, d.sources);
  } catch (err) {
    thinking.remove();
    add('bot', '❌ ' + err.message);
  } finally {
    $('send').disabled = false;
  }
};

refreshDocs();
</script>
</body>
</html>
